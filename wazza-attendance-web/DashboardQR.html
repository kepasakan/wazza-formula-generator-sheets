<!DOCTYPE html>
<html>

<head>
  <base target="_top">
  <script src="https://cdn.tailwindcss.com"></script>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: 'Inter', sans-serif;
    }

    .qr-card {
      transition: transform 0.3s ease;
    }

    .qr-card:hover {
      transform: translateY(-3px);
    }
  </style>
</head>

<body class="bg-gray-900 text-white h-screen overflow-hidden flex flex-col items-center justify-center p-4">

  <div class="text-center mb-6">
    <h1 class="text-3xl md:text-5xl font-black text-yellow-500 tracking-tighter uppercase drop-shadow-lg">WAZZA DIGITAL
    </h1>
    <p class="text-gray-400 mt-1 text-sm md:text-base tracking-widest">SISTEM KEHADIRAN BERPUSAT</p>
  </div>

  <div class="flex flex-col lg:flex-row gap-4 w-full max-w-7xl px-2 items-stretch justify-center">

    <div
      class="qr-card lg:flex-1 bg-gray-800 border-4 border-green-500 rounded-3xl p-5 flex flex-col items-center shadow-2xl relative overflow-hidden">
      <div
        class="bg-green-600 text-white font-bold py-1.5 px-6 rounded-full uppercase text-sm tracking-wider mb-4 shadow-lg">
        ✅ CLOCK IN
      </div>

      <div
        class="bg-white p-3 rounded-2xl shadow-inner relative h-48 w-48 xl:h-64 xl:w-64 flex items-center justify-center bg-gray-100 overflow-hidden">
        <div id="qrWrapper" class="w-full h-full flex items-center justify-center">
          <div id="loadingOverlay" class="absolute inset-0 bg-white z-20 flex items-center justify-center">
            <div class="animate-spin rounded-full h-10 w-10 border-t-4 border-green-500"></div>
          </div>
          <img id="qrImageGreen" src="" alt="Loading..." class="w-full h-full object-contain rounded-lg">
        </div>

        <div id="msgOverlay"
          class="hidden absolute inset-0 w-full h-full bg-gray-900 z-50 flex flex-col items-center justify-center text-center rounded-xl">
          <div class="text-5xl mb-2 text-red-500">⛔</div>
          <h2 id="msgText" class="text-2xl font-black text-white tracking-widest uppercase">TAMAT</h2>
        </div>
      </div>

      <div class="mt-4 text-center h-16 flex flex-col justify-center">
        <p id="tokenDisplay" class="text-2xl xl:text-4xl font-mono font-bold text-green-400 tracking-widest">...</p>
        <p class="text-xs text-gray-500 mt-1 uppercase font-bold">Hanya Waktu Pagi</p>
      </div>
    </div>

    <div
      class="qr-card lg:flex-1 bg-gray-800 border-4 border-blue-500 rounded-3xl p-5 flex flex-col items-center shadow-2xl relative">
      <div
        class="bg-blue-600 text-white font-bold py-1.5 px-6 rounded-full uppercase text-sm tracking-wider mb-4 shadow-lg">
        👋 CLOCK OUT
      </div>

      <div
        class="bg-white p-3 rounded-2xl shadow-inner h-48 w-48 xl:h-64 xl:w-64 flex items-center justify-center bg-gray-100">
        <img id="qrImageBlue" src="" alt="Loading..." class="w-full h-full object-contain rounded-lg">
      </div>

      <div class="mt-4 text-center h-16 flex flex-col justify-center">
        <p class="text-gray-400 text-xs">Balik Awal / Emergency?</p>
        <p class="text-blue-300 text-sm xl:text-base font-bold mt-1">Scan untuk kemaskini masa.</p>
        <p class="text-[10px] text-gray-500 mt-1 italic">*Auto-Checkout pukul 6:00 PM</p>
      </div>
    </div>

    <div
      class="qr-card lg:w-72 bg-gray-800 border-2 border-yellow-500 rounded-3xl p-5 flex flex-col items-center shadow-xl relative">
      <div
        class="bg-yellow-600 text-gray-900 font-bold py-1.5 px-6 rounded-full uppercase text-sm tracking-wider mb-4 shadow-lg">
        📝 PORTAL STAF
      </div>

      <div
        class="bg-white p-3 rounded-2xl shadow-inner h-40 w-40 xl:h-52 xl:w-52 flex items-center justify-center bg-gray-100 mt-2">
        <img id="qrImagePortal" src="" alt="Loading..." class="w-full h-full object-contain rounded-lg">
      </div>

      <div class="mt-auto text-center pb-2 w-full">
        <p class="text-yellow-400 text-sm font-bold uppercase tracking-wide">Cuti / Lambat?</p>
        <p class="text-gray-400 text-xs mt-1 px-2 leading-tight">Scan untuk masuk ke profil anda.</p>
      </div>
    </div>

  </div>

  <script>
    let currentToken = "";

    function initDashboard() {
      google.script.run.withSuccessHandler(function (baseURL) {

        // 1. QR BIRU
        const outURL = baseURL + "?page=clockout";
        const qrBlueSource = "https://quickchart.io/qr?text=" + encodeURIComponent(outURL) + "&size=350&margin=1&dark=000000&light=ffffff";
        document.getElementById('qrImageBlue').src = qrBlueSource;

        // 2. QR KUNING
        const portalURL = baseURL + "?page=portal";
        const qrPortalSource = "https://quickchart.io/qr?text=" + encodeURIComponent(portalURL) + "&size=300&margin=1&dark=000000&light=ffffff";
        document.getElementById('qrImagePortal').src = qrPortalSource;

        window.appBaseURL = baseURL;
        checkTokenUpdate();
        setInterval(checkTokenUpdate, 5000);

      }).getScriptURL();
    }

    function checkTokenUpdate() {
      google.script.run.withSuccessHandler(function (data) {
        const tokenDisplay = document.getElementById('tokenDisplay');

        if (data.isOpen) {
          document.getElementById('qrWrapper').classList.remove('hidden');
          document.getElementById('msgOverlay').classList.add('hidden');

          tokenDisplay.innerText = data.token;
          tokenDisplay.classList.remove('text-red-500');
          tokenDisplay.classList.add('text-green-400');

          if (data.token !== currentToken && data.token !== "") {
            currentToken = data.token;
            updateGreenQR(data.token);
          }
        } else {
          document.getElementById('qrWrapper').classList.add('hidden');
          document.getElementById('msgOverlay').classList.remove('hidden');
          if (data.statusMsg) document.getElementById('msgText').innerText = data.statusMsg;

          tokenDisplay.innerText = "🔒 TUTUP";
          tokenDisplay.classList.remove('text-green-400');
          tokenDisplay.classList.add('text-red-500');
        }
      }).getDashboardStatus();
    }

    function updateGreenQR(token) {
      document.getElementById('loadingOverlay').classList.remove('hidden');
      if (window.appBaseURL) {
        const scanURL = window.appBaseURL + "?token=" + token;
        const qrSource = "https://quickchart.io/qr?text=" + encodeURIComponent(scanURL) + "&size=350&margin=1&dark=000000&light=ffffff";

        const img = new Image();
        img.src = qrSource;
        img.onload = function () {
          document.getElementById('qrImageGreen').src = qrSource;
          document.getElementById('loadingOverlay').classList.add('hidden');
        };
      }
    }

    initDashboard();
  </script>
</body>

</html>
