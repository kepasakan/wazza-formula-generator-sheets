<!DOCTYPE html>
<html lang="ms">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Google Sheets: VLOOKUP Generator</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            color: #333;
            margin: 0;
            padding: 40px 20px;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        .header h1 {
            color: #0f9d58;
        }

        /* Seksyen Atas: Borang Input */
        .generator-card {
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.05);
            margin-bottom: 20px;
        }

        .input-group {
            margin-bottom: 15px;
        }

        .input-group label {
            display: block;
            font-weight: 600;
            margin-bottom: 8px;
            color: #444;
        }

        .input-group input {
            width: 100%;
            padding: 12px;
            font-size: 16px;
            border: 1px solid #ccc;
            border-radius: 6px;
            box-sizing: border-box;
            background-color: #f8f9fa;
        }

        .input-group input:focus {
            outline: 2px solid #0f9d58;
            background-color: white;
        }

        /* Seksyen Tengah: Hasil Formula */
        .result-card {
            background: #2d2d2d;
            padding: 20px;
            border-radius: 12px;
            text-align: center;
            margin-bottom: 30px;
            position: relative;
        }

        .result-label {
            color: #aaa;
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 10px;
            display: block;
        }

        .formula-output {
            color: #66d9ef;
            /* Warna biru ala-ala code editor */
            font-size: 28px;
            font-family: 'Courier New', Courier, monospace;
            font-weight: bold;
            word-wrap: break-word;
        }

        .copy-btn {
            margin-top: 15px;
            background-color: #0f9d58;
            color: white;
            border: none;
            padding: 10px 20px;
            font-size: 16px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            transition: background 0.2s;
        }

        .copy-btn:hover {
            background-color: #0b8043;
        }

        /* Seksyen Bawah: Embed Google Sheets */
        .embed-card {
            background: white;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.05);
        }

        .embed-card h3 {
            margin-top: 0;
            color: #444;
            border-bottom: 2px solid #eee;
            padding-bottom: 10px;
        }

        .iframe-container {
            width: 100%;
            height: 400px;
            border: 1px solid #ddd;
            border-radius: 8px;
            overflow: hidden;
            background-color: #f1f3f4;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }
    </style>
</head>

<body>

    <div class="container">
        <div class="header">
            <h1>VLOOKUP Generator</h1>
            <p>Isi tempat kosong di bawah, dan kitorang siapkan formula untuk kau.</p>
        </div>

        <div class="generator-card">
            <div class="input-group">
                <label>1. Sel apa yang kau nak cari? (Search Key)</label>
                <input type="text" id="searchKey" value="A2" placeholder="Contoh: A2" oninput="updateFormula()">
            </div>
            <div class="input-group">
                <label>2. Kat mana data tu berada? (Range)</label>
                <input type="text" id="range" value="'Data Staf'!A:E" placeholder="Contoh: Sheet2!A:C"
                    oninput="updateFormula()">
            </div>
            <div class="input-group">
                <label>3. Nak tarik maklumat dari lajur (column) nombor berapa?</label>
                <input type="number" id="colIndex" value="3" placeholder="Contoh: 2" oninput="updateFormula()">
            </div>
        </div>

        <div class="result-card">
            <span class="result-label">Formula Kau:</span>
            <div class="formula-output" id="finalFormula">=VLOOKUP(A2, 'Data Staf'!A:E, 3, FALSE)</div>
            <button class="copy-btn" onclick="copyToClipboard()">Copy Formula</button>
        </div>

        <div class="embed-card">
            <h3>Rujukan Visual (View-Only)</h3>
            <p style="color: #666; font-size: 14px;">Tengok struktur jadual ni supaya kau faham macam mana nombor lajur
                (column index) dikira.</p>

            <div class="iframe-container">
                <iframe
                    src="https://docs.google.com/spreadsheets/d/1S3EBlqCkQtLd4r5hAlI4CHJcGK4wjLtBQinnOKfWY4w/edit?rm=minimal&usp=sharing"></iframe>
            </div>
        </div>

    </div>

    <script>
        // Fungsi cantumkan teks untuk jadi formula
        function updateFormula() {
            let key = document.getElementById('searchKey').value || "A2";
            let range = document.getElementById('range').value || "Data!A:C";
            let col = document.getElementById('colIndex').value || "2";

            // Pasangkan jadi sintaks VLOOKUP standard
            let generated = `=VLOOKUP(${key}, ${range}, ${col}, FALSE)`;

            document.getElementById('finalFormula').innerText = generated;
        }

        // Fungsi butang Copy
        function copyToClipboard() {
            let textToCopy = document.getElementById('finalFormula').innerText;
            navigator.clipboard.writeText(textToCopy).then(() => {
                let btn = document.querySelector('.copy-btn');
                btn.innerText = "Copied! ✔";
                btn.style.backgroundColor = "#137333";

                // Kembalikan teks butang selepas 2 saat
                setTimeout(() => {
                    btn.innerText = "Copy Formula";
                    btn.style.backgroundColor = "#0f9d58";
                }, 2000);
            });
        }
    </script>

</body>

</html>
