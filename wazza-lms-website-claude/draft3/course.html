<!DOCTYPE html>
<html lang="ms">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Kursus – Wazza Academy</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=Space+Grotesk:wght@700&display=swap"
        rel="stylesheet" />
    <link rel="stylesheet" href="styles.css" />
    <script>
        // Security Check - Halau ke login kalau takda sesi
        if (!localStorage.getItem('wazza_session')) {
            window.location.href = 'login.html';
        }
    </script>
</head>

<body>

    <div class="topbar">
        <div class="tb-left" style="display: flex; align-items: center; gap: 1rem;">
            <button id="collapse-btn" class="icon-btn" onclick="WazzaDraft3.toggleSidebar()">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M3 12h18M3 6h18M3 18h18" />
                </svg>
            </button>
            <div class="logo-text">Wazza<span class="logo-dot">.</span>Academy</div>
        </div>
        <div class="tb-right">
            <button class="logout-btn" onclick="WazzaAuth.logout()">Log Keluar</button>
        </div>
    </div>

    <div class="lms">

        <div class="vid-area">

            <div id="course-picker" class="empty-box">
                <h2 style="font-family: 'Space Grotesk';">Pilih Kursus Anda</h2>
                <p style="color: rgba(255,255,255,0.6); margin-bottom: 2rem;">Sila pilih modul untuk mula belajar.</p>
                <div id="course-list-grid" class="course-grid-small">
                </div>
            </div>

            <div id="empty-state" class="empty-box" style="display: none;">
                <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="var(--green)" stroke-width="1.5">
                    <path d="M15 10l4.553-2.276A1 1 0 0121 8.618v6.764a1 1 0 01-1.447.894L15 14v-4z" />
                    <rect x="3" y="6" width="12" height="12" rx="2" stroke="currentColor" />
                </svg>
                <h2 style="font-family: 'Space Grotesk'; margin-top: 1rem;">Selamat Datang!</h2>
                <p style="color: var(--text2); font-size: 0.9rem;">Sila buka menu di atas dan pilih modul untuk mula
                    belajar.</p>
            </div>

            <div id="video-section" style="display: none;">

                <div class="vid-wrap" id="video-container">
                </div>

                <div class="youtube-fallback">
                    <span style="font-size: 0.8rem; color: rgba(255,255,255,0.6);">Video tidak main? Ralat
                        pelayar?</span>
                    <a href="#" id="yt-fallback-btn" target="_blank" class="btn-yt-outline">
                        Tonton di YouTube ↗
                    </a>
                </div>

                <div class="c-tabs">
                    <button class="ctab active" data-tab="overview"
                        onclick="showTab('overview', this)">Ringkasan</button>
                    <button class="ctab" data-tab="resources" onclick="showTab('resources', this)">Sumber &
                        Templat</button>
                </div>

                <div class="tab-panel active" id="tab-overview"></div>
                <div class="tab-panel" id="tab-resources"></div>

            </div>
        </div>

        <div class="pl-sidebar collapsed" id="sidebar">
            <div class="pl-head">
                <h3 style="margin:0; font-family: 'Space Grotesk'; font-size: 1rem;">Senarai Modul</h3>
            </div>
            <div id="playlist-container"></div>
        </div>

    </div>

    <script src="app.js"></script>
</body>

</html>
