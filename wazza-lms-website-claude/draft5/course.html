<!DOCTYPE html>
<html lang="ms">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Kursus – Wazza Academy</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Space+Grotesk:wght@400;500;600;700&display=swap"
        rel="stylesheet" />
    <style>
        /* ── Tokens & Reset ── */
        :root {
            --bg: #0a0a0f; --bg2: #12121a; --surface: #1a1a26; --surface2: #22222e;
            --border: rgba(255,255,255,0.08); --text: #e8e8ef; --text2: rgba(255,255,255,0.55);
            --green: #34A853; --blue: #4285F4; --yellow: #FBBC04; --red: #EA4335;
            --gradient: linear-gradient(135deg, #34A853, #4285F4, #FBBC04);
            --radius: 16px; --radius-sm: 10px;
        }
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        html { scroll-behavior: smooth; }
        body { font-family: 'Inter', sans-serif; color: var(--text); line-height: 1.6; }
        h1,h2,h3,h4 { font-family: 'Space Grotesk', sans-serif; line-height: 1.15; }
        a { color: inherit; text-decoration: none; }
        img { max-width: 100%; display: block; }
        .gradient-text { background: var(--gradient); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }

        body {
            background: #08080d;
            overflow: hidden;
        }

        /* ── TOPBAR ── */
        .topbar {
            background: rgba(8, 8, 13, 0.92);
            backdrop-filter: blur(16px);
            border-bottom: 1px solid var(--border);
            padding: 0.7rem 1.25rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: sticky;
            top: 0;
            z-index: 50;
            height: 52px;
        }

        .tb-left {
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        /* Logo — replaces ← Dashboard */
        .topbar-logo {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            text-decoration: none;
        }

        .topbar-logo-icon {
            width: 28px;
            height: 28px;
            border-radius: 7px;
            object-fit: cover;
            flex-shrink: 0;
        }

        .topbar-logo-text {
            font-family: 'Space Grotesk';
            font-weight: 700;
            font-size: 0.95rem;
            color: #fff;
        }

        .topbar-logo-dot {
            color: #34A853;
        }

        .divider-v {
            width: 1px;
            height: 18px;
            background: var(--border);
        }

        .course-name-top {
            font-family: 'Space Grotesk';
            font-size: 0.78rem;
            font-weight: 600;
            color: rgba(255, 255, 255, 0.45);
            max-width: 340px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .tb-right {
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        .prog-top {
            display: flex;
            align-items: center;
            gap: 0.65rem;
            font-size: 0.72rem;
            color: var(--text2);
        }

        .prog-top-bar {
            width: 80px;
            height: 3px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 2px;
            overflow: hidden;
        }

        .prog-top-fill {
            height: 3px;
            background: #34A853;
            border-radius: 2px;
            transition: width 0.5s;
        }

        /* Modul toggle */
        .btn-toggle-panel {
            display: flex;
            align-items: center;
            gap: 0.4rem;
            padding: 0.38rem 0.85rem;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 7px;
            font-size: 0.73rem;
            font-weight: 600;
            color: var(--text2);
            cursor: pointer;
            font-family: 'Inter';
            transition: all 0.2s;
        }

        .btn-toggle-panel:hover {
            border-color: #34A853;
            color: #34A853;
        }

        .btn-toggle-panel.panel-open {
            background: rgba(52, 168, 83, 0.12);
            border-color: rgba(52, 168, 83, 0.35);
            color: #34A853;
        }

        /* ── LAYOUT ── */
        .lms {
            display: grid;
            grid-template-columns: 1fr 0px;
            height: calc(100vh - 52px);
            transition: grid-template-columns 0.35s cubic-bezier(0.4, 0, 0.2, 1);
            overflow: hidden;
        }

        .lms.panel-open {
            grid-template-columns: 1fr clamp(260px, 29%, 430px);
        }

        /* LEFT */
        .vid-area {
            display: flex;
            flex-direction: column;
            overflow-y: auto;
            min-width: 0;
        }

        /* ── WELCOME SCREEN ── */
        .welcome-screen {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 3rem 2rem;
            text-align: center;
            min-height: calc(100vh - 52px);
            position: relative;
            overflow: hidden;
        }

        .welcome-screen::before {
            content: '';
            position: absolute;
            inset: 0;
            background-image: radial-gradient(rgba(255, 255, 255, 0.025) 1px, transparent 1px);
            background-size: 36px 36px;
            pointer-events: none;
        }

        .welcome-screen::after {
            content: '';
            position: absolute;
            top: 40%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 500px;
            height: 300px;
            background: radial-gradient(ellipse, rgba(52, 168, 83, 0.08), transparent 70%);
            pointer-events: none;
        }

        .welcome-inner {
            position: relative;
            z-index: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            animation: wFadeUp 0.55s ease both;
        }

        @keyframes wFadeUp {
            from {
                opacity: 0;
                transform: translateY(18px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .welcome-logo-wrap {
            width: 64px;
            height: 64px;
            border-radius: 18px;
            background: linear-gradient(135deg, #34A853, #0D652D);
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 1.75rem;
            box-shadow: 0 12px 40px rgba(52, 168, 83, 0.22);
        }

        .welcome-course-logo {
            width: 110px;
            height: 110px;
            object-fit: cover;
            border-radius: 22px;
            margin-bottom: 1.25rem;
            filter:
                drop-shadow(0 0 16px rgba(52, 168, 83, 0.35))
                drop-shadow(0 8px 24px rgba(0, 0, 0, 0.5));
            animation: wFadeUp 0.55s ease both, logoFloat 4s ease-in-out 0.55s infinite;
        }

        @keyframes logoFloat {
            0%, 100% { transform: translateY(0px); }
            50%       { transform: translateY(-7px); }
        }

        .welcome-tag {
            font-size: 0.68rem;
            font-weight: 700;
            letter-spacing: 3px;
            text-transform: uppercase;
            color: #34A853;
            margin-bottom: 0.75rem;
        }

        .welcome-screen h1 {
            font-family: 'Space Grotesk';
            font-size: clamp(1.6rem, 3.5vw, 2.2rem);
            font-weight: 800;
            letter-spacing: -0.5px;
            line-height: 1.15;
            margin-bottom: 0.85rem;
            color: #fff;
        }

        .welcome-screen h1 span {
            background: linear-gradient(135deg, #34A853, #4285F4);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .welcome-screen p {
            font-size: 0.88rem;
            color: rgba(255, 255, 255, 0.45);
            max-width: 380px;
            line-height: 1.75;
            margin-bottom: 2rem;
        }

        .welcome-screen p strong {
            color: rgba(255, 255, 255, 0.7);
        }

        .welcome-hint {
            display: flex;
            align-items: center;
            gap: 0.6rem;
            font-size: 0.8rem;
            color: rgba(255, 255, 255, 0.3);
            border: 1px dashed rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            padding: 0.65rem 1.25rem;
        }

        .welcome-hint strong {
            color: rgba(255, 255, 255, 0.5);
            margin: 0 3px;
        }

        .hint-arrow {
            animation: bounceR 1.8s ease-in-out infinite;
        }

        @keyframes bounceR {

            0%,
            100% {
                transform: translateX(0);
            }

            50% {
                transform: translateX(5px);
            }
        }

        /* ── VIDEO ── */
        .vid-wrap {
            background: #000;
            position: relative;
            display: none;
            width: 100%;
            padding-bottom: 56.25%;
            /* 16:9 ratio — same as YouTube */
        }

        .vid-wrap.visible {
            display: block;
        }

        #video-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }

        .vid-wrap iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        /* Error note — shown once a lesson is loaded */
        .vid-error-note {
            display: none;
            background: rgba(251, 188, 4, 0.06);
            border-top: 1px solid rgba(251, 188, 4, 0.12);
            padding: 0.48rem 1.25rem;
            font-size: 0.73rem;
            color: rgba(251, 188, 4, 0.7);
            line-height: 1.5;
            gap: 0.45rem;
            align-items: center;
        }

        .vid-error-note.visible {
            display: flex;
        }

        .vid-error-note strong {
            color: rgba(251, 188, 4, 0.95);
        }

        /* ── CONTROLS ── */
        .vid-controls {
            background: #12121a;
            border-bottom: 1px solid var(--border);
            padding: 0.6rem 1.25rem;
            display: none;
            align-items: center;
            gap: 1rem;
            flex-wrap: wrap;
        }

        .vid-controls.visible {
            display: flex;
        }

        .vc-btn {
            display: flex;
            align-items: center;
            gap: 0.35rem;
            font-size: 0.74rem;
            color: var(--text2);
            cursor: pointer;
            background: none;
            border: none;
            transition: color 0.2s;
            font-family: 'Inter';
            white-space: nowrap;
        }

        .vc-btn:hover {
            color: #fff;
        }

        .vc-btn.accent {
            color: #34A853;
        }

        .vc-btn.completed-btn {
            color: #2d9e5f;
        }

        .vc-btn:disabled {
            opacity: 0.3;
            cursor: not-allowed;
        }

        .vc-sep {
            width: 1px;
            height: 14px;
            background: var(--border);
        }

        .vc-title {
            font-family: 'Space Grotesk';
            font-weight: 700;
            font-size: 1.2rem;
            flex: 1;
            min-width: 0;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .vc-yt-btn {
            display: flex;
            align-items: center;
            gap: 0.4rem;
            font-size: 0.71rem;
            font-weight: 600;
            color: rgba(255, 255, 255, 0.4);
            cursor: pointer;
            background: none;
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 6px;
            padding: 0.3rem 0.7rem;
            font-family: 'Inter';
            transition: all 0.2s;
        }

        .vc-yt-btn:hover {
            border-color: #FF0000;
            color: #FF0000;
        }

        /* ── TABS ── */
        .c-tabs {
            padding: 0 1.25rem;
            border-bottom: 1px solid var(--border);
            display: none;
            background: #12121a;
        }

        .c-tabs.visible {
            display: flex;
        }

        .ctab {
            padding: 0.77rem 1rem;
            font-size: 0.76rem;
            font-weight: 600;
            color: var(--text2);
            cursor: pointer;
            border: none;
            border-bottom: 2px solid transparent;
            transition: all 0.2s;
            background: none;
            font-family: 'Inter';
        }

        .ctab.active {
            color: #fff;
            border-bottom-color: #34A853;
        }

        .ctab:hover {
            color: rgba(255, 255, 255, 0.8);
        }

        .tab-panel {
            display: none;
            padding: 1.25rem 1.5rem;
        }

        .tab-panel.active {
            display: block;
        }

        .lesson-hd h2 {
            font-family: 'Space Grotesk';
            font-size: 1.05rem;
            font-weight: 800;
            margin-bottom: 0.35rem;
        }

        .lesson-meta {
            display: flex;
            gap: 1rem;
            font-size: 0.71rem;
            color: var(--text2);
            margin-bottom: 1.2rem;
        }

        .lesson-desc {
            font-size: 0.85rem;
            color: var(--text2);
            line-height: 1.75;
            margin-bottom: 1.2rem;
        }

        .tip-box {
            padding: 0.85rem 1rem;
            background: rgba(52, 168, 83, 0.07);
            border-left: 3px solid #34A853;
            border-radius: 0 8px 8px 0;
            font-size: 0.8rem;
            color: var(--text2);
            line-height: 1.6;
        }

        .res-list {
            list-style: none;
        }

        .res-item {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            padding: 0.65rem 0;
            border-bottom: 1px solid var(--border);
        }

        .res-item:last-child {
            border: none;
        }

        .res-icon {
            font-size: 1rem;
            width: 26px;
            text-align: center;
            opacity: 0.7;
        }

        .res-name {
            font-size: 0.81rem;
            color: var(--text2);
            flex: 1;
        }

        .res-dl {
            font-size: 0.69rem;
            font-weight: 600;
            color: #34A853;
        }

        .notes-area {
            width: 100%;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text);
            padding: 0.9rem;
            font-family: 'Inter';
            font-size: 0.84rem;
            line-height: 1.6;
            resize: vertical;
            min-height: 160px;
            outline: none;
        }

        .notes-area:focus {
            border-color: #34A853;
        }

        .save-btn {
            margin-top: 0.65rem;
            background: #34A853;
            color: #fff;
            border: none;
            padding: 0.5rem 1.1rem;
            border-radius: 8px;
            font-family: 'Space Grotesk';
            font-weight: 700;
            font-size: 0.76rem;
            cursor: pointer;
            transition: opacity 0.2s;
        }

        .save-btn:hover {
            opacity: 0.85;
        }

        /* ── SIDEBAR ── */
        .pl-sidebar {
            background: #0e0e16;
            border-left: 1px solid var(--border);
            overflow-y: auto;
            overflow-x: hidden;
            display: flex;
            flex-direction: column;
            min-width: 0;
        }

        .pl-head {
            padding: 1.1rem 1.1rem 0.85rem;
            border-bottom: 1px solid var(--border);
            border-top: 4px solid rgba(255, 255, 255, 0.04);
            margin-top: 0.5rem;
            position: sticky;
            top: 0;
            background: #0e0e16;
            z-index: 2;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .pl-head h3 {
            font-family: 'Space Grotesk';
            font-size: 0.74rem;
            font-weight: 700;
            color: var(--text2);
            text-transform: uppercase;
            letter-spacing: 1.5px;
        }

        .pl-prog {
            margin-top: 0.5rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            font-size: 0.67rem;
            color: var(--text2);
        }

        .pl-bar {
            height: 3px;
            background: rgba(255, 255, 255, 0.07);
            border-radius: 2px;
            margin-top: 0.4rem;
            overflow: hidden;
        }

        .pl-bar-fill {
            height: 3px;
            background: #34A853;
            border-radius: 2px;
            transition: width 0.5s;
        }

        .sec-head {
            padding: 0.7rem 1.1rem 0.3rem;
            font-size: 0.59rem;
            font-weight: 700;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: rgba(255, 255, 255, 0.18);
        }

        .lesson-item {
            display: flex;
            align-items: flex-start;
            gap: 0.65rem;
            padding: 0.72rem 1.1rem;
            border-bottom: 1px solid rgba(255, 255, 255, 0.03);
            cursor: pointer;
            transition: background 0.15s;
        }

        .lesson-item:hover {
            background: rgba(255, 255, 255, 0.03);
        }

        .lesson-item.active {
            background: rgba(52, 168, 83, 0.08);
            border-left: 3px solid #34A853;
        }

        .lesson-item.done .l-num {
            background: #2d9e5f;
            color: #fff;
        }

        .l-num {
            width: 21px;
            height: 21px;
            border-radius: 6px;
            background: rgba(255, 255, 255, 0.08);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.62rem;
            font-weight: 700;
            color: var(--text2);
            flex-shrink: 0;
            margin-top: 1px;
        }

        .lesson-item.active .l-num {
            background: #34A853;
            color: #fff;
        }

        .l-info {
            flex: 1;
            min-width: 0;
        }

        .l-name {
            font-size: 0.79rem;
            font-weight: 500;
            color: rgba(255, 255, 255, 0.72);
            line-height: 1.3;
            margin-bottom: 0.2rem;
        }

        .lesson-item.active .l-name {
            color: #fff;
            font-weight: 600;
        }

        .l-dur {
            font-size: 0.64rem;
            color: var(--text2);
        }

        /* ── BAHAN SECTION ── */
        .bahan-section {
            border-bottom: 1px solid var(--border);
        }

        .bahan-head {
            padding: 0.9rem 1.1rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            cursor: pointer;
            transition: background 0.15s;
            background: #0e0e16;
            position: sticky;
            top: 0;
            z-index: 3;
        }

        .bahan-head:hover {
            background: rgba(255, 255, 255, 0.03);
        }

        .bahan-head-left {
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .bahan-head h3 {
            font-family: 'Space Grotesk';
            font-size: 0.74rem;
            font-weight: 700;
            color: var(--text2);
            text-transform: uppercase;
            letter-spacing: 1.5px;
        }

        .bahan-chevron {
            color: var(--text2);
            transition: transform 0.25s cubic-bezier(0.4, 0, 0.2, 1);
            flex-shrink: 0;
        }

        .bahan-section.open .bahan-chevron {
            transform: rotate(180deg);
        }

        .bahan-body {
            display: none;
        }

        .bahan-section.open .bahan-body {
            display: block;
        }

        .bahan-item {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            padding: 0.7rem 1.1rem;
            border-bottom: 1px solid rgba(255, 255, 255, 0.03);
            transition: background 0.15s;
        }

        .bahan-item:hover {
            background: rgba(255, 255, 255, 0.03);
        }

        a.bahan-item {
            text-decoration: none;
            color: inherit;
            cursor: pointer;
        }

        .bahan-icon {
            font-size: 1rem;
            width: 26px;
            text-align: center;
            opacity: 0.7;
            flex-shrink: 0;
        }

        .bahan-name {
            font-size: 0.79rem;
            color: rgba(255, 255, 255, 0.72);
            flex: 1;
            line-height: 1.3;
        }

        .bahan-link {
            font-size: 0.69rem;
            font-weight: 600;
            color: #34A853;
            text-decoration: none;
            white-space: nowrap;
        }

        .bahan-link:hover {
            opacity: 0.8;
        }

        .bahan-empty {
            padding: 0.85rem 1.1rem;
            font-size: 0.79rem;
            color: var(--text2);
        }

        /* ── SECTION ACCORDION ── */
        .sec-accordion {
            border-bottom: 1px solid rgba(255, 255, 255, 0.04);
        }

        .sec-accordion + .sec-accordion {
            border-top: 1px solid rgba(255, 255, 255, 0.05);
            margin-top: 0.2rem;
        }

        .sec-accordion-head {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0.9rem 1.1rem 0.5rem;
            cursor: pointer;
            user-select: none;
            transition: background 0.15s;
        }

        .sec-accordion-head:hover {
            background: rgba(255, 255, 255, 0.02);
        }

        .sec-head-text {
            font-size: 0.74rem;
            font-weight: 700;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            color: var(--text2);
        }

        .sec-chevron {
            color: var(--text2);
            transition: transform 0.25s cubic-bezier(0.4, 0, 0.2, 1);
            flex-shrink: 0;
        }

        .sec-accordion.open .sec-chevron {
            transform: rotate(180deg);
        }

        .sec-accordion-body {
            display: none;
        }

        .sec-accordion.open .sec-accordion-body {
            display: block;
            padding-bottom: 0.4rem;
        }

        /* ── WELCOME PREMIUM ── */
        .welcome-exclusive-badge {
            display: inline-flex;
            align-items: center;
            gap: 0.45rem;
            background: linear-gradient(135deg, rgba(52, 168, 83, 0.12), rgba(251, 188, 4, 0.07));
            border: 1px solid rgba(52, 168, 83, 0.4);
            border-radius: 50px;
            padding: 0.45rem 1.15rem;
            font-size: 0.63rem;
            font-weight: 800;
            letter-spacing: 2.5px;
            text-transform: uppercase;
            color: #34A853;
            margin-bottom: 1.85rem;
            box-shadow: 0 0 28px rgba(52, 168, 83, 0.12);
        }

        .welcome-notice {
            display: flex;
            align-items: flex-start;
            gap: 0.65rem;
            background: rgba(255, 77, 77, 0.05);
            border: 1px solid rgba(255, 77, 77, 0.18);
            border-radius: 10px;
            padding: 0.85rem 1.15rem;
            font-size: 0.76rem;
            color: rgba(255, 120, 120, 0.85);
            max-width: 420px;
            text-align: left;
            line-height: 1.55;

    <script>
        // ==========================================
        // WazzaCourses — Load & query course data
        // ==========================================
        const WazzaCourses = {
          _cache: null,
          async loadAll() {
            if (this._cache) return this._cache;
            try {
              const res = await fetch('courses.json');
              const data = await res.json();
              this._cache = data.courses;
              return this._cache;
            } catch (e) { console.error('Failed to load courses.json:', e); return []; }
          },
          async getCourse(id) {
            const courses = await this.loadAll();
            return courses.find(c => c.id === id) || null;
          },
          async getNonBundleCourses() {
            const courses = await this.loadAll();
            return courses.filter(c => !c.isBundle);
          },
          getAllLessons(course) {
            if (!course || !course.sections) return [];
            const lessons = [];
            course.sections.forEach(sec => sec.lessons.forEach(l => lessons.push(l)));
            return lessons;
          },
          getTotalDuration(course) { return this.getAllLessons(course).reduce((sum, l) => sum + (l.duration || 0), 0); },
          getLesson(course, lessonId) { return this.getAllLessons(course).find(l => l.id === lessonId) || null; },
          getLessonIndex(course, lessonId) { return this.getAllLessons(course).findIndex(l => l.id === lessonId); }
        };

        // ==========================================
        // WazzaAuth — Session & authentication
        // ==========================================
        const SESSION_KEY = 'wazza_session';
        const REG_KEY     = 'wazza_registered_users';

        const WazzaAuth = {
          async login(email, password) {
            const em = email.trim().toLowerCase();
            try {
              const res = await fetch('users.json');
              const data = await res.json();
              const found = data.users.find(u => u.email.toLowerCase() === em && u.password === password);
              if (found) {
                this._startSession(found);
                found.purchased.forEach(id => WazzaStore.purchaseCourse(id));
                return { ok: true, user: found };
              }
            } catch (e) { console.warn('users.json read failed:', e); }
            const registered = this._getRegistered();
            const local = registered.find(u => u.email.toLowerCase() === em && u.password === password);
            if (local) {
              this._startSession(local);
              (local.purchased || []).forEach(id => WazzaStore.purchaseCourse(id));
              return { ok: true, user: local };
            }
            return { ok: false, error: 'Email atau password tidak betul.' };
          },
          async register(name, email, password) {
            const em = email.trim().toLowerCase();
            try {
              const res = await fetch('users.json');
              const data = await res.json();
              if (data.users.find(u => u.email.toLowerCase() === em))
                return { ok: false, error: 'Email ini sudah berdaftar.' };
            } catch (e) {}
            const registered = this._getRegistered();
            if (registered.find(u => u.email.toLowerCase() === em))
              return { ok: false, error: 'Email ini sudah berdaftar.' };
            const newUser = { id: 'u_' + Date.now(), name: name.trim(), email: em, password, purchased: [], role: 'student' };
            registered.push(newUser);
            localStorage.setItem(REG_KEY, JSON.stringify(registered));
            this._startSession(newUser);
            return { ok: true, user: newUser };
          },
          logout() { localStorage.removeItem(SESSION_KEY); window.location.href = 'login.html'; },
          getSession() { try { const raw = localStorage.getItem(SESSION_KEY); return raw ? JSON.parse(raw) : null; } catch { return null; } },
          isLoggedIn() { return !!this.getSession(); },
          requireAuth() { if (!this.isLoggedIn()) { window.location.href = 'login.html'; } },
          _startSession(user) {
            const session = { id: user.id, name: user.name, email: user.email, role: user.role };
            localStorage.setItem(SESSION_KEY, JSON.stringify(session));
          },
          _getRegistered() { try { const raw = localStorage.getItem(REG_KEY); return raw ? JSON.parse(raw) : []; } catch { return []; } }
        };

        // ==========================================
        // WazzaStore — localStorage persistence (user-scoped)
        // ==========================================
        function getStoreKey() {
          try {
            const s = localStorage.getItem(SESSION_KEY);
            const sess = s ? JSON.parse(s) : null;
            return sess ? `wazza_data_${sess.id}` : 'wazza_academy_data';
          } catch { return 'wazza_academy_data'; }
        }

        const WazzaStore = {
          _getData() {
            try { const raw = localStorage.getItem(getStoreKey()); return raw ? JSON.parse(raw) : { owned: [], progress: {}, activity: [] }; }
            catch { return { owned: [], progress: {}, activity: [] }; }
          },
          _save(data) { localStorage.setItem(getStoreKey(), JSON.stringify(data)); },
          purchaseCourse(courseId) {
            const data = this._getData();
            if (!data.owned.includes(courseId)) {
              data.owned.push(courseId);
              if (!data.progress[courseId]) data.progress[courseId] = { completed: [], notes: {}, lastLesson: null, lastAccessed: Date.now() };
              this._save(data);
              this.logActivity('enroll', courseId, 'Purchased course');
            }
          },
          enrollCourse(courseId) { this.purchaseCourse(courseId); },
          isPurchased(courseId) { return this._getData().owned.includes(courseId); },
          isEnrolled(courseId) { return this.isPurchased(courseId); },
          getOwnedCourses() { return this._getData().owned; },
          getLastAccessed() {
            const data = this._getData();
            let latest = null, latestTs = 0;
            for (const [courseId, prog] of Object.entries(data.progress)) {
              if (prog.lastAccessed && prog.lastAccessed > latestTs) { latestTs = prog.lastAccessed; latest = { courseId, lessonId: prog.lastLesson }; }
            }
            return latest;
          },
          async getCompletedCourseIds() {
            const data = this._getData();
            const courses = await WazzaCourses.loadAll();
            const completed = [];
            for (const courseId of data.owned) {
              const course = courses.find(c => c.id === courseId);
              if (!course || course.isBundle) continue;
              const all = WazzaCourses.getAllLessons(course);
              const prog = data.progress[courseId] || { completed: [] };
              if (all.length > 0 && prog.completed.length >= all.length) completed.push(courseId);
            }
            return completed;
          },
          getProgress(courseId) {
            const data = this._getData();
            return data.progress[courseId] || { completed: [], notes: {}, lastLesson: null, lastAccessed: null };
          },
          markComplete(courseId, lessonId) {
            const data = this._getData();
            if (!data.progress[courseId]) data.progress[courseId] = { completed: [], notes: {}, lastLesson: null, lastAccessed: Date.now() };
            if (!data.progress[courseId].completed.includes(lessonId)) data.progress[courseId].completed.push(lessonId);
            data.progress[courseId].lastLesson = lessonId;
            data.progress[courseId].lastAccessed = Date.now();
            this._save(data);
          },
          unmarkComplete(courseId, lessonId) {
            const data = this._getData();
            if (data.progress[courseId]) {
              data.progress[courseId].completed = data.progress[courseId].completed.filter(id => id !== lessonId);
              this._save(data);
            }
          },
          isLessonComplete(courseId, lessonId) { return this.getProgress(courseId).completed.includes(lessonId); },
          setLastLesson(courseId, lessonId) {
            const data = this._getData();
            if (!data.progress[courseId]) data.progress[courseId] = { completed: [], notes: {}, lastLesson: null, lastAccessed: Date.now() };
            data.progress[courseId].lastLesson = lessonId;
            data.progress[courseId].lastAccessed = Date.now();
            this._save(data);
          },
          saveNote(courseId, lessonId, text) {
            const data = this._getData();
            if (!data.progress[courseId]) data.progress[courseId] = { completed: [], notes: {}, lastLesson: null, lastAccessed: Date.now() };
            data.progress[courseId].notes[lessonId] = text;
            this._save(data);
          },
          getNote(courseId, lessonId) { return this.getProgress(courseId).notes[lessonId] || ''; },
          logActivity(type, courseId, detail) {
            const data = this._getData();
            data.activity.unshift({ type, courseId, detail, timestamp: Date.now() });
            if (data.activity.length > 50) data.activity = data.activity.slice(0, 50);
            this._save(data);
          },
          getRecentActivity(limit = 10) { return this._getData().activity.slice(0, limit); },
          async getStats() {
            const data = this._getData();
            const owned = data.owned;
            const courses = await WazzaCourses.loadAll();
            let totalLessons = 0, completedLessons = 0, totalWatchedMinutes = 0, completedCourses = 0;
            for (const courseId of owned) {
              const course = courses.find(c => c.id === courseId);
              if (!course || course.isBundle) continue;
              const allLessons = WazzaCourses.getAllLessons(course);
              const prog = data.progress[courseId] || { completed: [] };
              totalLessons += allLessons.length;
              completedLessons += prog.completed.length;
              prog.completed.forEach(lid => { const lesson = allLessons.find(l => l.id === lid); if (lesson) totalWatchedMinutes += lesson.duration; });
              if (allLessons.length > 0 && prog.completed.length >= allLessons.length) completedCourses++;
            }
            return {
              coursesOwned: owned.filter(id => { const c = courses.find(cc => cc.id === id); return c && !c.isBundle; }).length,
              hoursWatched: Math.round((totalWatchedMinutes / 60) * 10) / 10,
              avgProgress: totalLessons > 0 ? Math.round((completedLessons / totalLessons) * 100) : 0,
              completedCourses, totalLessons, completedLessons
            };
          },
          resetAll() { localStorage.removeItem(getStoreKey()); }
        };

        // ── Utilities ──
        function timeAgo(timestamp) {
          const diff = Date.now() - timestamp, mins = Math.floor(diff / 60000);
          if (mins < 1) return 'Just now';
          if (mins < 60) return `${mins} min ago`;
          const hrs = Math.floor(mins / 60);
          if (hrs < 24) return `${hrs} hour${hrs > 1 ? 's' : ''} ago`;
          const days = Math.floor(hrs / 24);
          if (days < 7) return `${days} day${days > 1 ? 's' : ''} ago`;
          return `${Math.floor(days / 7)} week${Math.floor(days / 7) > 1 ? 's' : ''} ago`;
        }
        function getGreeting() { const h = new Date().getHours(); if (h < 12) return 'Good morning'; if (h < 17) return 'Good afternoon'; return 'Good evening'; }
        function formatDate() { return new Date().toLocaleDateString('en-US', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' }); }
        function getActivityIcon(type) { return ({ enroll: '🧾', complete: '✅', watch: '▶', download: '📥', note: '📝' })[type] || '📌'; }
        function getActivityLabel(type) { return ({ enroll: 'ENROLLED', complete: 'COMPLETED', watch: 'WATCHED', download: 'SAVED', note: 'NOTE' })[type] || 'ACTION'; }
        function getCourseIcon(iconType) {
          const icons = {
            grid: '<svg width="40" height="40" viewBox="0 0 24 24" fill="none"><rect x="3" y="3" width="18" height="18" rx="2" stroke="#fff" stroke-width="1.5"/><path d="M3 9h18M3 15h18M9 3v18" stroke="#fff" stroke-width="1.5"/></svg>',
            formula: '<svg width="40" height="40" viewBox="0 0 24 24" fill="none"><path d="M4 6h16M4 10h16M4 14h10M4 18h13" stroke="#fff" stroke-width="1.5" stroke-linecap="round"/></svg>',
            chart: '<svg width="40" height="40" viewBox="0 0 24 24" fill="none"><rect x="4" y="13" width="4" height="7" rx="1" fill="#fff"/><rect x="10" y="8" width="4" height="12" rx="1" fill="#fff"/><rect x="16" y="4" width="4" height="16" rx="1" fill="#fff"/></svg>',
            code: '<svg width="40" height="40" viewBox="0 0 24 24" fill="none"><path d="M16 18l6-6-6-6M8 6l-6 6 6 6" stroke="#fff" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>',
            clock: '<svg width="40" height="40" viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="9" stroke="#fff" stroke-width="1.5"/><path d="M12 7v5l3 3" stroke="#fff" stroke-width="1.5" stroke-linecap="round"/></svg>',
            layers: '<svg width="40" height="40" viewBox="0 0 24 24" fill="none"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5" stroke="#fff" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>'
          };
          return icons[iconType] || icons.grid;
        }
    </script>
    <script>
        WazzaAuth.requireAuth();

        let currentCourse = null;
        let currentCourseId = '';
        let currentLessonId = '';
        let allLessons = [];
        let currentVideoUrl = '';
        let panelOpen = true; // Default: panel terbuka macam YouTube

        const params = new URLSearchParams(window.location.search);
        const courseIdParam = params.get('id') || 'senarai-video-autocrat';
        const lessonParam = params.get('lesson');

        function togglePanel() {
            panelOpen = !panelOpen;
            document.getElementById('lms-layout').classList.toggle('panel-open', panelOpen);
            document.getElementById('btn-toggle-panel').classList.toggle('panel-open', panelOpen);
        }

        // Auto-buka panel kanan bila page load
        document.addEventListener('DOMContentLoaded', function () {
            document.getElementById('lms-layout').classList.add('panel-open');
            document.getElementById('btn-toggle-panel').classList.add('panel-open');
        });

        async function initCourse() {
            currentCourseId = courseIdParam;
            currentCourse = await WazzaCourses.getCourse(currentCourseId);
            if (!currentCourse) { document.getElementById('topbar-title').textContent = 'Kursus tidak dijumpai'; return; }
            if (!WazzaStore.isEnrolled(currentCourseId)) WazzaStore.enrollCourse(currentCourseId);

            allLessons = WazzaCourses.getAllLessons(currentCourse);
            document.getElementById('topbar-title').textContent = currentCourse.title;
            document.getElementById('welcome-course-name').textContent = currentCourse.title;
            document.title = `${currentCourse.title} – Wazza Academy`;

            renderPlaylist();
            renderMaterials();

            /*
            const prog = WazzaStore.getProgress(currentCourseId);
            if (lessonParam && allLessons.find(l => l.id === lessonParam)) {
                loadLesson(lessonParam);
            } else if (prog.lastLesson && allLessons.find(l => l.id === prog.lastLesson)) {
                loadLesson(prog.lastLesson);
            }
            */
            // else: stay on welcome screen, panel stays closed
        }

        function loadLesson(lessonId) {
            currentLessonId = lessonId;
            const lesson = WazzaCourses.getLesson(currentCourse, lessonId);
            if (!lesson) return;

            // Hide welcome, reveal video UI
            document.getElementById('welcome-screen').style.display = 'none';
            document.getElementById('video-wrap').classList.add('visible');
            document.getElementById('vid-controls').classList.add('visible');
            document.getElementById('c-tabs').classList.add('visible');

            // Mobile: scroll ke atas untuk tunjuk video dari atas
            if (window.innerWidth < 768) {
                setTimeout(() => window.scrollTo({ top: 0, behavior: 'smooth' }), 80);
            }

            WazzaStore.setLastLesson(currentCourseId, lessonId);
            WazzaStore.logActivity('watch', currentCourseId, `Ditonton: "${lesson.title}"`);

            currentVideoUrl = lesson.videoUrl || '';
            const container = document.getElementById('video-container');

            if (currentVideoUrl.trim()) {
                container.innerHTML = `<iframe
          src="${toEmbedUrl(currentVideoUrl)}"
          title="${lesson.title}"
          allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
          allowfullscreen></iframe>`;
            } else {
                container.innerHTML = `
          <div style="width:100%;aspect-ratio:16/9;background:linear-gradient(135deg,var(--surface),var(--bg2));
               display:flex;flex-direction:column;align-items:center;justify-content:center;gap:0.75rem;color:var(--text2);">
            <svg width="52" height="52" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1" opacity="0.3"><polygon points="5 3 19 12 5 21 5 3"/></svg>
            <p style="font-size:0.85rem">Video akan datang tidak lama lagi</p>
          </div>`;
            }

            document.getElementById('vc-title').textContent = lesson.title;
            const idx = WazzaCourses.getLessonIndex(currentCourse, lessonId);
            document.getElementById('btn-prev').disabled = idx <= 0;
            document.getElementById('btn-next').disabled = idx >= allLessons.length - 1;

            // Overview tab
            const lessonIdx = WazzaCourses.getLessonIndex(currentCourse, lessonId);
            const desc = lesson.description || `Pelajaran ini meliputi <strong>${lesson.title}</strong>.`;
            const tip = lesson.tip || `Ambil nota semasa menonton dan simpan dalam tab "Nota Saya".`;
            document.getElementById('tab-overview').innerHTML = `
        <div class="lesson-hd">
          <h2>${lesson.title}</h2>
          <div class="lesson-meta">
            <span>⏱ ${lesson.duration} min</span>
            <span>· Pelajaran ${lessonIdx + 1} dari ${allLessons.length}</span>
          </div>
        </div>
        <p class="lesson-desc">${desc}</p>
        <div class="tip-box">💡 <strong>Tips Pro:</strong> ${tip}</div>`;

            // Nota tab
            const resources = lesson.resources || [];
            const resUrl = (u) => u ? (/^https?:\/\//.test(u) ? u : 'https://' + u) : '#';
            document.getElementById('tab-resources').innerHTML = `
        <div class="lesson-hd">
          <h2>Nota & Bahan</h2>
          <p style="font-size:0.79rem;color:var(--text2);margin-bottom:1rem">Nota, slide deck, dan bahan untuk pelajaran ini.</p>
        </div>
        <ul class="res-list">${resources.length
                    ? resources.map(r => `
              <li class="res-item">
                <span class="res-icon">${r.icon || '📄'}</span>
                <span class="res-name">${r.name}</span>
                <a href="${resUrl(r.url)}" target="_blank" class="res-dl">${r.label || 'Buka ↗'}</a>
              </li>`).join('')
                    : '<li style="padding:1.2rem 0;color:var(--text2);font-size:0.82rem">Tiada nota untuk pelajaran ini — nota &amp; slide deck akan ditambah kemudian.</li>'
                }</ul>`;

            document.querySelectorAll('.lesson-item').forEach(el => {
                el.classList.remove('active');
                const lid = el.dataset.lessonId;
                const l = WazzaCourses.getLesson(currentCourse, lid);
                if (lid === lessonId) {
                    el.classList.add('active');
                    el.querySelector('.l-dur').textContent = `⏱ ${l.duration} min · Sedang main`;
                    // Desktop je — mobile guna scrollTo(0) kat atas
                    if (window.innerWidth >= 768) {
                        setTimeout(() => el.scrollIntoView({ behavior: 'smooth', block: 'nearest' }), 350);
                    }
                } else if (l) {
                    el.querySelector('.l-dur').textContent = `⏱ ${l.duration} min`;
                }
            });

            showTab('overview', document.querySelector('.ctab[data-tab="overview"]'));
            // history.replaceState(null, '', `course.html?id=${currentCourseId}&lesson=${lessonId}`);
        }

        function openInYoutube() { if (currentVideoUrl) window.open(currentVideoUrl, '_blank'); }

        function toggleComplete() {
            if (!currentLessonId) return;
            const isDone = WazzaStore.isLessonComplete(currentCourseId, currentLessonId);
            if (isDone) {
                WazzaStore.unmarkComplete(currentCourseId, currentLessonId);
            } else {
                WazzaStore.markComplete(currentCourseId, currentLessonId);
                const lesson = WazzaCourses.getLesson(currentCourse, currentLessonId);
                WazzaStore.logActivity('complete', currentCourseId, `Diselesaikan: "${lesson.title}"`);
            }
            updateMarkButton(); renderPlaylist();
        }

        function updateMarkButton() {
            const btn = document.getElementById('btn-mark');
            const isDone = WazzaStore.isLessonComplete(currentCourseId, currentLessonId);
            btn.textContent = isDone ? '✓ Selesai' : '✓ Tandai Selesai';
            btn.className = isDone ? 'vc-btn completed-btn' : 'vc-btn accent';
        }

        function navigateLesson(dir) {
            const idx = WazzaCourses.getLessonIndex(currentCourse, currentLessonId);
            const newIdx = idx + dir;
            if (newIdx >= 0 && newIdx < allLessons.length) loadLesson(allLessons[newIdx].id);
        }

        const sectionStates = {};

        function toggleSection(secId) {
            sectionStates[secId] = !sectionStates[secId];
            const el = document.getElementById(secId);
            if (el) el.classList.toggle('open', sectionStates[secId]);
        }

        function renderPlaylist() {
            const container = document.getElementById('playlist-container');
            let html = ''; let n = 0;
            currentCourse.sections.forEach((sec, secIdx) => {
                const secId = `sec-acc-${secIdx}`;
                if (sectionStates[secId] === undefined) sectionStates[secId] = true;
                const isOpen = sectionStates[secId];
                html += `<div class="sec-accordion${isOpen ? ' open' : ''}" id="${secId}">
                    <div class="sec-accordion-head" onclick="toggleSection('${secId}')">
                        <span class="sec-head-text">${sec.title}</span>
                        <svg class="sec-chevron" width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M6 9l6 6 6-6"/></svg>
                    </div>
                    <div class="sec-accordion-body">`;
                sec.lessons.forEach(lesson => {
                    n++;
                    const isDone = WazzaStore.isLessonComplete(currentCourseId, lesson.id);
                    const isActive = lesson.id === currentLessonId;
                    html += `
            <div class="lesson-item${isActive ? ' active' : ''}${isDone ? ' done' : ''}"
                 data-lesson-id="${lesson.id}" onclick="loadLesson('${lesson.id}')">
              <div class="l-num">${isDone ? '✓' : n}</div>
              <div class="l-info">
                <div class="l-name">${lesson.title}</div>
                <div class="l-dur">⏱ ${lesson.duration} min${isActive ? ' · Sedang main' : ''}</div>
              </div>
            </div>`;
                });
                html += `</div></div>`;
            });
            container.innerHTML = html;
        }

function showTab(tabId, btn) {
            document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.ctab').forEach(t => t.classList.remove('active'));
            document.getElementById('tab-' + tabId).classList.add('active');
            if (btn) btn.classList.add('active');
        }

        function saveCurrentNote() {
            const text = document.getElementById('notes-input').value;
            WazzaStore.saveNote(currentCourseId, currentLessonId, text);
            const l = WazzaCourses.getLesson(currentCourse, currentLessonId);
            if (l) WazzaStore.logActivity('note', currentCourseId, `Nota: "${l.title}"`);
            const msg = document.getElementById('save-msg');
            msg.style.display = 'block';
            setTimeout(() => msg.style.display = 'none', 2500);
        }

        function toEmbedUrl(url) {
            if (!url) return url;
            if (url.includes('youtube.com/embed/')) return url;
            const s = url.match(/youtu\.be\/([\w-]+)/);
            if (s) return `https://www.youtube.com/embed/${s[1]}`;
            const w = url.match(/[?&]v=([\w-]+)/);
            if (w) return `https://www.youtube.com/embed/${w[1]}`;
            return url;
        }

        function logKeluar() {
            localStorage.clear();
            window.location.href = 'login.html';
        }

        let bahanOpen = false;

        function toggleBahan() {
            bahanOpen = !bahanOpen;
            document.getElementById('bahan-section').classList.toggle('open', bahanOpen);
        }

        function renderMaterials() {
            const body = document.getElementById('bahan-body');
            if (!body || !currentCourse) return;
            const materials = currentCourse.materials || [];
            if (!materials.length) {
                body.innerHTML = '<div class="bahan-empty">Tiada bahan untuk kursus ini.</div>';
                return;
            }
            body.innerHTML = materials.map(m => {
                const url = m.url ? (/^https?:\/\//.test(m.url) ? m.url : 'https://' + m.url) : '#';
                return `
                <a href="${url}" target="_blank" class="bahan-item">
                    <span class="bahan-icon">${m.icon || '📄'}</span>
                    <span class="bahan-name">${m.name}</span>
                    <span class="bahan-link">${m.label || 'Buka ↗'}</span>
                </a>`;
            }).join('');
        }

        initCourse();
    </script>
    <script>
        (function () {
          'use strict';
          document.addEventListener('DOMContentLoaded', function () {
            patchTogglePanel();
            addRippleEffect();
          });

          function patchTogglePanel() {
            const btn = document.getElementById('btn-toggle-panel');
            const lms = document.getElementById('lms-layout');
            const sidebar = document.getElementById('pl-sidebar');
            if (!btn || !lms) return;

            window.togglePanel = function () {
              const isOpen = lms.classList.contains('panel-open');
              if (isOpen) {
                lms.classList.remove('panel-open');
                btn.classList.remove('panel-open');
                if (window.innerWidth < 768) {
                  const topbarH = (document.querySelector('.topbar') || {}).offsetHeight || 52;
                  window.scrollTo({ top: topbarH, behavior: 'smooth' });
                }
              } else {
                lms.classList.add('panel-open');
                btn.classList.add('panel-open');
                if (window.innerWidth < 768) {
                  setTimeout(function () {
                    if (sidebar) {
                      const scrollTop = window.pageYOffset + sidebar.getBoundingClientRect().top - 60;
                      window.scrollTo({ top: Math.max(0, scrollTop), behavior: 'smooth' });
                    }
                  }, 100);
                }
              }
            };

            function syncBtnState() { btn.classList.toggle('panel-open', lms.classList.contains('panel-open')); }
            syncBtnState();
            window.addEventListener('resize', syncBtnState);
          }

          function addRippleEffect() {
            const btn = document.getElementById('btn-toggle-panel');
            if (!btn) return;
            btn.addEventListener('click', function (e) {
              const oldRipple = btn.querySelector('.ripple');
              if (oldRipple) oldRipple.remove();
              const ripple = document.createElement('span');
              ripple.classList.add('ripple');
              const rect = btn.getBoundingClientRect();
              const size = Math.max(rect.width, rect.height);
              ripple.style.cssText = `width:${size}px;height:${size}px;left:${e.clientX - rect.left - size / 2}px;top:${e.clientY - rect.top - size / 2}px;`;
              btn.appendChild(ripple);
              ripple.addEventListener('animationend', () => ripple.remove());
            });
          }
        })();
    </script>
</body>

</html>
