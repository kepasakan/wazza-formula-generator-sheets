<!DOCTYPE html>
<html lang="ms">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wazza Formula Generator - Embed Edition</title>
    <link
        href="https://fonts.googleapis.com/css2?family=DM+Mono:ital,wght@0,400;0,500;1,400&family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --app-bg: #0d1117;
            --sidebar-bg: #111827;
            --sidebar-border: rgba(255, 255, 255, 0.06);
            --main-bg: #0d1117;
            --text: #e8edf5;
            --text-muted: #6b7a99;
            --text-hint: #3a475e;
            --accent: #2563eb;
            --accent-light: #3b82f6;
            --accent-glow: rgba(37, 99, 235, 0.2);
            --green: #16a34a;
            --sans: 'Plus Jakarta Sans', sans-serif;
            --mono: 'DM Mono', monospace;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: var(--sans);
            background: var(--app-bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        header {
            height: 56px;
            background: #161d2e;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 28px;
            flex-shrink: 0;
        }

        .hd-left {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .hd-logo {
            width: 34px;
            height: 34px;
            background: var(--accent);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            color: #fff;
            box-shadow: 0 0 16px var(--accent-glow);
        }

        .hd-name {
            font-size: 14px;
            font-weight: 700;
        }

        .hd-sub {
            font-size: 11px;
            color: var(--text-muted);
        }

        .app-layout {
            display: grid;
            grid-template-columns: 320px 1fr;
            flex: 1;
            min-height: 0;
        }

        /* SIDEBAR */
        .sidebar {
            background: var(--sidebar-bg);
            border-right: 1px solid var(--sidebar-border);
            display: flex;
            flex-direction: column;
            overflow-y: auto;
            padding: 20px 16px;
            gap: 15px;
        }

        .sb-section-title {
            font-size: 9px;
            font-weight: 700;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            color: var(--text-hint);
        }

        .mode-toggle {
            display: flex;
            background: rgba(255, 255, 255, 0.04);
            border-radius: 9px;
            padding: 3px;
            gap: 2px;
        }

        .mode-btn {
            flex: 1;
            padding: 8px;
            font-size: 11px;
            font-weight: 600;
            border: none;
            border-radius: 7px;
            background: transparent;
            color: var(--text-muted);
            cursor: pointer;
        }

        .mode-btn.active {
            background: var(--accent);
            color: #fff;
        }

        .field {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .field-lbl {
            font-size: 10.5px;
            font-weight: 600;
            color: var(--text-muted);
        }

        .field input {
            width: 100%;
            padding: 10px;
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 8px;
            color: var(--text);
            font-size: 13px;
        }

        .fbox-wrap {
            background: #0a0e17;
            border: 1px solid rgba(255, 255, 255, 0.07);
            border-radius: 9px;
            margin-top: 10px;
        }

        .fbox-code {
            padding: 12px;
            font-family: var(--mono);
            font-size: 10px;
            line-height: 1.6;
            color: #5c6e8a;
            white-space: pre-wrap;
            word-break: break-all;
            max-height: 200px;
            overflow-y: auto;
        }

        .c-fn {
            color: #60a5fa;
        }

        .c-str {
            color: #4ade80;
        }

        .c-rng {
            color: #fb923c;
        }

        .btn-copy {
            width: 100%;
            padding: 12px;
            background: var(--accent);
            border: none;
            border-radius: 9px;
            color: #fff;
            font-weight: 700;
            cursor: pointer;
            transition: 0.2s;
            margin-top: 5px;
        }

        .btn-copy.ok {
            background: var(--green);
        }

        /* MAIN AREA (EMBED) */
        .main-area {
            background: var(--main-bg);
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            overflow: hidden;
        }

        .embed-card {
            flex: 1;
            background: #161d2e;
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: 12px;
            overflow: hidden;
            position: relative;
            display: flex;
            flex-direction: column;
        }

        .embed-header {
            padding: 10px 15px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            font-size: 11px;
            font-weight: 700;
            color: var(--text-muted);
            display: flex;
            justify-content: space-between;
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
            flex: 1;
        }

        @media (max-width: 860px) {
            .app-layout {
                grid-template-columns: 1fr;
            }

            .sidebar {
                display: none;
            }
        }
    </style>
</head>

<body>
    <header>
        <div class="hd-left">
            <div class="hd-logo">W</div>
            <div>
                <div class="hd-name">Wazza Formula Generator</div>
                <div class="hd-sub">Embed Edition · v3.2</div>
            </div>
        </div>
    </header>

    <div class="app-layout">
        <aside class="sidebar">
            <div class="sb-section-title">Konfigurasi</div>

            <div class="mode-toggle">
                <button class="mode-btn active" id="tab-wa" onclick="setMode('wa')">🔗 WA Pautan</button>
                <button class="mode-btn" id="tab-std" onclick="setMode('std')">📱 Nombor Std</button>
            </div>

            <div class="field">
                <div class="field-lbl">Kolum Data (Cth: A)</div>
                <input id="srcCol" value="A" maxlength="1" oninput="sync()">
            </div>

            <div class="field">
                <div class="field-lbl">Nama Header Baru</div>
                <input id="headerName" value="PAUTAN WHATSAPP" oninput="sync()">
            </div>

            <div class="field" id="msgField">
                <div class="field-lbl">Mesej Auto (Optional)</div>
                <input id="msgText" placeholder="Hai, nak tanya..." oninput="sync()">
            </div>

            <div class="fbox-wrap">
                <div class="fbox-code" id="fboxCode"></div>
            </div>

            <button class="btn-copy" id="copyBtn" onclick="copyFn()">
                <span id="copyTxt">Salin Formula</span>
            </button>
        </aside>

        <main class="main-area">
            <div class="embed-card">
                <div class="embed-header">
                    <span>LIVE GOOGLE SHEETS TESTER</span>
                    <span id="sheetStatus">Mode: Edit 🟢</span>
                </div>
                <iframe
                    src="https://docs.google.com/spreadsheets/d/1S3EBlqCkQtLd4r5hAlI4CHJcGK4wjLtBQinnOKfWY4w/edit?rm=minimal&usp=sharing"></iframe>
            </div>
        </main>
    </div>

    <script>
        let st = { mode: 'wa', src: 'A', row: 2, hdr: 'PAUTAN WHATSAPP', msg: '' };

        function getFormula() {
            const range = st.src + st.row + ':' + st.src;
            if (st.mode === 'wa') {
                const mp = st.msg ? ' & "?text=" & ENCODEURL("' + st.msg + '")' : '';
                return `=LET(\n  nota,"Wazza Digital",\n  columntelefon,${range},\n  namaheader,"${st.hdr}",\n  formuladata,ARRAYFORMULA(\n    IF(columntelefon="","",\n      "https://wa.me/" &\n      REGEXREPLACE(REGEXREPLACE(\n        TO_TEXT(columntelefon),\n        "\\D+",""),"^(60)?0*","60")${mp})),\n  VSTACK(namaheader,formuladata)\n)`;
            }
            return `=LET(\n  nota,"Wazza Digital",\n  columntelefon,${range},\n  namaheader,"${st.hdr}",\n  formuladata,ARRAYFORMULA(\n    IF(columntelefon="","",\n      REGEXREPLACE(REGEXREPLACE(\n        TO_TEXT(columntelefon),\n        "\\D+",""),"^(60)?0*","60"))),\n  VSTACK(namaheader,formuladata)\n)`;
        }

        function hl(code) {
            return code.replace(/\b(LET|ARRAYFORMULA|IF|REGEXREPLACE|TO_TEXT|VSTACK|ENCODEURL)\b/g, '<span class="c-fn">$1</span>')
                .replace(/"[^"]*"/g, m => '<span class="c-str">' + m + '</span>')
                .replace(/\b([A-Z]\d+:[A-Z])\b/g, '<span class="c-rng">$1</span>');
        }

        function sync() {
            st.src = (document.getElementById('srcCol').value || 'A').toUpperCase();
            st.hdr = document.getElementById('headerName').value;
            st.msg = document.getElementById('msgText').value.trim();
            document.getElementById('fboxCode').innerHTML = hl(getFormula());
        }

        function setMode(m) {
            st.mode = m;
            document.getElementById('tab-wa').classList.toggle('active', m === 'wa');
            document.getElementById('tab-std').classList.toggle('active', m === 'std');
            document.getElementById('msgField').style.display = m === 'wa' ? 'flex' : 'none';
            sync();
        }

        function copyFn() {
            navigator.clipboard.writeText(getFormula()).then(() => {
                const b = document.getElementById('copyBtn'), t = document.getElementById('copyTxt');
                b.classList.add('ok'); t.textContent = 'Berjaya Disalin!';
                setTimeout(() => { b.classList.remove('ok'); t.textContent = 'Salin Formula'; }, 2000);
            });
        }

        sync();
    </script>
</body>

</html>
