<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Penjana Formula WhatsApp Google Sheets</title>
    <style>
        /* Elemen UX/UI: Warna yang lembut, bersih dan reka bentuk responsif */
        body { 
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            background-color: #f0f4f8; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
            margin: 0; 
            padding: 20px;
            box-sizing: border-box;
        }
        .card { 
            background: #ffffff; 
            padding: 32px; 
            border-radius: 16px; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.05); 
            max-width: 500px; 
            width: 100%; 
        }
        h2 { 
            color: #102a43; 
            margin-top: 0; 
            font-size: 24px;
            margin-bottom: 8px;
        }
        .subtitle {
            color: #627d98;
            font-size: 14px;
            margin-bottom: 24px;
            line-height: 1.5;
        }
        .form-group { 
            margin-bottom: 20px; 
        }
        label { 
            display: block; 
            margin-bottom: 8px; 
            font-weight: 600; 
            color: #334e68; 
            font-size: 14px;
        }
        input[type="text"] { 
            width: 100%; 
            padding: 12px 16px; 
            border: 2px solid #cbd5e1; 
            border-radius: 8px; 
            font-size: 16px; 
            font-weight: 600;
            color: #102a43;
            box-sizing: border-box; 
            transition: border-color 0.3s ease;
        }
        input[type="text"]:focus {
            outline: none;
            border-color: #25D366;
        }
        /* Hanya lajur range yang automatik huruf besar */
        #rangeInput {
            text-transform: uppercase;
        }
        .code-box { 
            background: #f1f5f9; 
            padding: 16px; 
            border-radius: 8px; 
            border: 1px solid #e2e8f0; 
            font-family: 'Courier New', Courier, monospace; 
            font-size: 13px; 
            overflow-x: auto; 
            white-space: pre-wrap; 
            margin-bottom: 24px; 
            color: #0f172a;
            line-height: 1.6;
            position: relative;
        }
        button { 
            background-color: #25D366; 
            color: white; 
            border: none; 
            padding: 14px 20px; 
            font-size: 16px; 
            font-weight: bold; 
            border-radius: 8px; 
            cursor: pointer; 
            width: 100%; 
            transition: all 0.3s ease;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
        }
        button:hover { 
            background-color: #128C7E; 
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(37, 211, 102, 0.3);
        }
        .footer-note { 
            font-size: 13px; 
            color: #829ab1; 
            margin-top: 16px; 
            text-align: center;
        }
    </style>
</head>
<body>

    <div class="card">
        <h2>Penjana Formula WhatsApp 🟢</h2>
        <p class="subtitle">Hasilkan formula kalis ralat secara automatik. Hanya masukkan maklumat di bawah dan salin formula ke dalam Google Sheets anda.</p>

        <div class="form-group">
            <label for="rangeInput">1. Di manakah lajur Nombor Telefon anda?</label>
            <input type="text" id="rangeInput" value="D2:D" placeholder="Cth: B2:B">
        </div>

        <div class="form-group">
            <label for="headerInput">2. Apakah nama tajuk lajur (Header) yang dimahu?</label>
            <input type="text" id="headerInput" value="PAUTAN WHATSAPP" placeholder="Cth: LINK WASAP">
        </div>

        <label>3. Salin formula di bawah:</label>
        <div class="code-box" id="formulaOutput"></div>

        <button id="copyBtn" onclick="copyFormula()">
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg>
            Salin Formula
        </button>
        <p class="footer-note">💡 Tampal (Paste) formula ini di <b>baris pertama</b> lajur yang kosong.</p>
    </div>

    <script>
        // Logik Data DevOps: Menjana formula secara dinamik berdasarkan input
        function generateFormula() {
            // 1. Ambil nilai range, buang ruang kosong, jadikan huruf besar
            let range = document.getElementById('rangeInput').value.trim().toUpperCase();
            if (!range) { range = 'D2:D'; } // Fallback jika kosong

            // 2. Ambil nilai header
            let header = document.getElementById('headerInput').value.trim();
            if (!header) { header = 'PAUTAN WHATSAPP'; } // Fallback jika kosong
            
            // Keselamatan data: Jika klien tertekan simbol " dalam nama header, 
            // kita tukarkan kepada "" supaya formula Sheets tak ralat (syntax error).
            header = header.replace(/"/g, '""');

            // Formula dengan LET yang dikemaskini secara langsung
            const formula = `=LET(
  columntelefon, ${range},
  namaheader, "${header}",
  formulawhatsapp, ARRAYFORMULA(IF(columntelefon="", "", "https://wa.me/" & REGEXREPLACE(REGEXREPLACE(TO_TEXT(columntelefon), "\\D+", ""), "^(60)?0*", "60"))),
  VSTACK(namaheader, formulawhatsapp)
)`;
            document.getElementById('formulaOutput').textContent = formula;
        }

        // UX/UI: Memberi maklum balas visual kepada pengguna
        function copyFormula() {
            // Gunakan kaedah salinan yang serasi dengan persekitaran iFrame/Web
            const textToCopy = document.getElementById('formulaOutput').textContent;
            
            // Cuba gunakan kaedah standard navigator.clipboard dahulu
            if (navigator.clipboard && window.isSecureContext) {
                navigator.clipboard.writeText(textToCopy).then(showSuccess);
            } else {
                // Fallback untuk iFrame atau persekitaran lama
                const textArea = document.createElement("textarea");
                textArea.value = textToCopy;
                textArea.style.position = "fixed";
                textArea.style.left = "-999999px";
                textArea.style.top = "-999999px";
                document.body.appendChild(textArea);
                textArea.focus();
                textArea.select();
                try {
                    document.execCommand('copy');
                    showSuccess();
                } catch (err) {
                    console.error('Gagal menyalin', err);
                }
                textArea.remove();
            }
        }

        function showSuccess() {
            const btn = document.getElementById('copyBtn');
            const originalHtml = btn.innerHTML;
            
            // Ubah status butang kepada berjaya
            btn.innerHTML = "✅ Berjaya Disalin!";
            btn.style.backgroundColor = "#128C7E";
            
            // Kembalikan ke keadaan asal selepas 2 saat
            setTimeout(() => {
                btn.innerHTML = originalHtml;
                btn.style.backgroundColor = "#25D366";
            }, 2000);
        }

        // Initialize: Dengar perubahan pada kedua-dua input untuk kemas kini *real-time*
        document.getElementById('rangeInput').addEventListener('input', generateFormula);
        document.getElementById('headerInput').addEventListener('input', generateFormula);
        
        // Jana formula kali pertama apabila halaman dimuatkan
        generateFormula();
    </script>
</body>
</html>
