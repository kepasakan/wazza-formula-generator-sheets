<!DOCTYPE html>
<html lang="ms">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Log Masuk – Wazza AutoCrat Masterclass</title>
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Space+Grotesk:wght@400;500;600;700&display=swap"
    rel="stylesheet" />
  <style>
    /* ── Tokens & Reset ── */
    :root {
      --bg: #0a0a0f; --bg2: #12121a; --surface: #1a1a26; --surface2: #22222e;
      --border: rgba(255,255,255,0.08); --text: #e8e8ef; --text2: rgba(255,255,255,0.55);
      --green: #34A853; --blue: #4285F4; --yellow: #FBBC04; --red: #EA4335;
      --gradient: linear-gradient(135deg, #34A853, #4285F4, #FBBC04);
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body { font-family: 'Inter', sans-serif; color: var(--text); line-height: 1.6; }
    h1,h2,h3,h4 { font-family: 'Space Grotesk', sans-serif; line-height: 1.15; }
    a { color: inherit; text-decoration: none; }
    img { max-width: 100%; display: block; }
    .gradient-text { background: var(--gradient); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
  </style>
  <style>
    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--bg);
      position: relative;
      overflow: hidden;
    }

    /* Background grid + glow */
    .bg-grid {
      position: fixed;
      inset: 0;
      background-image: radial-gradient(rgba(255, 255, 255, 0.03) 1px, transparent 1px);
      background-size: 36px 36px;
      pointer-events: none;
    }

    .bg-glow {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -60%);
      width: 700px;
      height: 700px;
      background: radial-gradient(circle, rgba(52, 168, 83, 0.1) 0%, transparent 65%);
      pointer-events: none;
    }

    /* Card */
    .login-card {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 440px;
      padding: 2.8rem 2.4rem;
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 20px;
      box-shadow: 0 24px 80px rgba(0, 0, 0, 0.5);
      text-align: center;
      margin: 1.5rem;
    }

    /* Logo */
    .login-logo {
      display: inline-flex;
      align-items: center;
      gap: 0.6rem;
      margin-bottom: 2.2rem;
      text-decoration: none;
    }

    .login-logo .logo-text {
      font-family: 'Space Grotesk', sans-serif;
      font-weight: 700;
      font-size: 1.25rem;
      color: var(--text);
    }

    /* AutoCrat visual block */
    .autocrat-visual {
      margin-bottom: 2rem;
    }

    .autocrat-badge {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      background: rgba(52, 168, 83, 0.08);
      border: 1px solid rgba(52, 168, 83, 0.2);
      color: var(--green);
      padding: 0.35rem 0.9rem;
      border-radius: 50px;
      font-size: 0.72rem;
      font-weight: 700;
      letter-spacing: 1px;
      text-transform: uppercase;
      margin-bottom: 1rem;
    }

    .autocrat-title {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 1.85rem;
      font-weight: 800;
      letter-spacing: -0.5px;
      line-height: 1.15;
      margin-bottom: 0.5rem;
    }

    .autocrat-sub {
      font-size: 0.85rem;
      color: var(--text2);
      line-height: 1.6;
    }

    /* Divider */
    .login-divider {
      height: 1px;
      background: var(--border);
      margin: 1.8rem 0;
    }

    /* Form */
    .login-label {
      display: block;
      font-size: 0.72rem;
      font-weight: 700;
      letter-spacing: 0.8px;
      text-transform: uppercase;
      color: var(--text2);
      text-align: left;
      margin-bottom: 0.45rem;
    }

    .login-input-wrap {
      position: relative;
      margin-bottom: 1.2rem;
    }

    .login-input {
      width: 100%;
      padding: 0.85rem 3rem 0.85rem 1rem;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--text);
      font-family: 'Inter', sans-serif;
      font-size: 1rem;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
      letter-spacing: 3px;
    }

    .login-input:focus {
      border-color: var(--green);
      box-shadow: 0 0 0 3px rgba(52, 168, 83, 0.12);
    }

    .login-input::placeholder {
      color: rgba(255, 255, 255, 0.2);
      letter-spacing: 0;
    }

    .toggle-pw {
      position: absolute;
      right: 0.9rem;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      cursor: pointer;
      color: var(--text2);
      font-size: 1.1rem;
      padding: 0;
      line-height: 1;
      transition: color 0.2s;
    }

    .toggle-pw:hover {
      color: var(--text);
    }

    .btn-login {
      width: 100%;
      padding: 0.9rem;
      background: var(--green);
      color: #fff;
      border: none;
      border-radius: 10px;
      font-family: 'Space Grotesk', sans-serif;
      font-weight: 700;
      font-size: 0.95rem;
      cursor: pointer;
      transition: all 0.25s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
    }

    .btn-login:hover:not(:disabled) {
      background: #2d9247;
      transform: translateY(-1px);
      box-shadow: 0 8px 25px rgba(52, 168, 83, 0.3);
    }

    .btn-login:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    /* Back link */
    .login-back {
      display: block;
      margin-top: 1.4rem;
      font-size: 0.8rem;
      color: var(--text2);
      transition: color 0.2s;
    }

    .login-back:hover {
      color: var(--green);
    }

    /* Toast */
    #auth-toast {
      display: none;
      position: fixed;
      bottom: 2rem;
      left: 50%;
      transform: translateX(-50%);
      background: #ea4335;
      color: #fff;
      padding: 0.75rem 1.5rem;
      border-radius: 10px;
      font-size: 0.88rem;
      font-weight: 600;
      z-index: 999;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.4);
      white-space: nowrap;
    }

    /* Shake animation */
    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      20%       { transform: translateX(-6px); }
      40%       { transform: translateX(6px); }
      60%       { transform: translateX(-4px); }
      80%       { transform: translateX(4px); }
    }

    .shake {
      animation: shake 0.4s ease;
    }
  </style>
</head>

<body>
  <div class="bg-grid"></div>
  <div class="bg-glow"></div>

  <div class="login-card" id="login-card">

    <a href="index.html" class="login-logo">
      <span class="logo-icon">
        <svg width="26" height="26" viewBox="0 0 28 28" fill="none">
          <rect x="2" y="2" width="24" height="24" rx="6" fill="url(#lg1)" />
          <path d="M8 10h12M8 14h8M8 18h10" stroke="#fff" stroke-width="2" stroke-linecap="round" />
          <defs>
            <linearGradient id="lg1" x1="2" y1="2" x2="26" y2="26">
              <stop stop-color="#34A853" />
              <stop offset="1" stop-color="#0D652D" />
            </linearGradient>
          </defs>
        </svg>
      </span>
      <span class="logo-text">Wazza<span class="logo-dot">.</span>Academy</span>
    </a>

    <div class="autocrat-visual">
      <div class="autocrat-badge">
        <span>●</span> AutoCrat Masterclass
      </div>
      <div class="autocrat-title">
        Jimatkan masa.<br><span class="gradient-text">AutoCrat</span> buat kerja.
      </div>
      <div class="autocrat-sub">Masukkan kata laluan untuk akses kandungan kelas.</div>
    </div>

    <div class="login-divider"></div>

    <label class="login-label" for="login-password">Kata Laluan</label>
    <div class="login-input-wrap">
      <input
        type="password"
        id="login-password"
        class="login-input"
        placeholder="Masukkan kata laluan"
        autocomplete="current-password"
      />
      <button class="toggle-pw" type="button" id="toggle-pw-btn" onclick="togglePassword()" title="Tunjuk/Sembunyi">
        👁
      </button>
    </div>

    <button class="btn-login" id="login-btn" onclick="handleLogin()">
      Masuk ke Kelas →
    </button>

    <a href="index.html" class="login-back">← Kembali ke Laman Utama</a>
  </div>

  <div id="auth-toast"></div>

  <script>
    const VALID_PASSWORD = 'kelasautocrat123';

    if (localStorage.getItem('wazza_session')) {
      window.location.href = 'course.html';
    }

    function showToast(msg, isSuccess) {
      const t = document.getElementById('auth-toast');
      t.textContent = msg;
      t.style.display = 'block';
      t.style.background = isSuccess ? '#34A853' : '#ea4335';
      clearTimeout(t._timer);
      t._timer = setTimeout(() => { t.style.display = 'none'; }, 3000);
    }

    function togglePassword() {
      const input = document.getElementById('login-password');
      input.type = input.type === 'password' ? 'text' : 'password';
    }

    function handleLogin() {
      const password = document.getElementById('login-password').value;
      const btn = document.getElementById('login-btn');
      const card = document.getElementById('login-card');

      if (!password) {
        showToast('Sila masukkan kata laluan.');
        document.getElementById('login-password').focus();
        return;
      }

      if (password !== VALID_PASSWORD) {
        card.classList.add('shake');
        setTimeout(() => card.classList.remove('shake'), 450);
        showToast('Kata laluan salah. Cuba semula.');
        document.getElementById('login-password').value = '';
        document.getElementById('login-password').focus();
        return;
      }

      btn.disabled = true;
      btn.textContent = 'Sila tunggu...';

      localStorage.setItem('wazza_session', JSON.stringify({
        id: 'u001',
        name: 'Developer',
        role: 'admin',
        purchased: ['senarai-video-autocrat']
      }));

      showToast('Berjaya! Mengalihkan...', true);
      setTimeout(() => window.location.href = 'course.html', 800);
    }

    document.addEventListener('keydown', e => {
      if (e.key === 'Enter') handleLogin();
    });
  </script>
</body>

</html>
